version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    groups:
      non-breaking:
        update-types:
          - minor
          - patch
        patterns:
          - '*'
