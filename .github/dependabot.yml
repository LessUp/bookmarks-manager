version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: quarterly
    open-pull-requests-limit: 1
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    groups:
      non-breaking:
        update-types:
          - minor
          - patch
        patterns:
          - '*'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: quarterly
    open-pull-requests-limit: 1
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
