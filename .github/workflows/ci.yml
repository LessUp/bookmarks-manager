# =============================================================================
# 🔷 COMPREHENSIVE CI WORKFLOW
# =============================================================================
# Runs comprehensive checks on every push and PR
# =============================================================================

name: 🔷 CI

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # =========================================================================
  # 📋 CHANGE DETECTION
  # =========================================================================
  changes:
    name: 📋 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.changes.outputs.src }}
      docs: ${{ steps.changes.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            src:
              - 'src/**'
              - 'package*.json'
              - 'tsconfig*.json'
              - 'vite.config.ts'
              - 'tailwind.config.js'
              - '.eslintrc*'
              - '.prettierrc*'
              - '.github/workflows/ci.yml'
            docs:
              - '**/*.md'
              - 'docs/**'

  # =========================================================================
  # 🧪 CORE TESTS
  # =========================================================================
  test:
    name: 🧪 Test (${{ matrix.test }})
    needs: changes
    if: needs.changes.outputs.src == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test: [unit, typecheck, lint]
        node-version: [20, 22]
        include:
          - test: unit
            command: test --reporter=verbose
          - test: typecheck
            command: typecheck
          - test: lint
            command: lint
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🧪 Run ${{ matrix.test }}
        run: npm run ${{ matrix.command }}

  # =========================================================================
  # 📊 TEST COVERAGE
  # =========================================================================
  coverage:
    name: 📊 Coverage
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 📊 Run coverage
        run: npm run test:coverage

      - name: 📤 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: 💬 Comment coverage
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const lines = summary.total.lines.pct;
            const funcs = summary.total.functions.pct;
            
            const body = `## 📊 Coverage Report\n\n| Metric | Coverage |\n|--------|----------|\n| Lines | ${lines}% |\n| Functions | ${funcs}% |`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
        continue-on-error: true

  # =========================================================================
  # 🏗️ BUILD VERIFICATION
  # =========================================================================
  build:
    name: 🏗️ Build
    needs: changes
    if: needs.changes.outputs.src == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🏗️ Build application
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist/
          retention-days: 1

  # =========================================================================
  # 🔒 SECURITY AUDIT
  # =========================================================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🔒 Run npm audit
        run: |
          npm audit --audit-level=high --production 2>&1 || true

      - name: 🔍 Check for known vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # =========================================================================
  # ✅ FINAL STATUS
  # =========================================================================
  ci-success:
    name: ✅ CI Success
    needs: [test, coverage, build, security]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          if [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.build.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ CI passed"
