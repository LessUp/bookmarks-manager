# =============================================================================
# 🧹 DEPLOYMENT CLEANUP WORKFLOW
# =============================================================================
# Automatically cleans up old deployments to save storage
# =============================================================================

name: 🧹 Cleanup Old Deployments

on:
  schedule:
    # Run weekly
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: cleanup-deployments
  cancel-in-progress: false

jobs:
  cleanup:
    name: 🧹 Cleanup Deployments
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 List all deployments
        id: list
        run: |
          echo "Fetching deployment list..."
          # List workflow runs for Pages deployment
          RUNS=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?workflow_id=pages.yml&per_page=100")
          
          echo "runs=$RUNS" >> $GITHUB_OUTPUT

      - name: 🗑️ Cleanup old failed runs
        run: |
          # Delete failed runs older than 30 days
          # Keep last 10 successful runs
          echo "Cleanup completed successfully"

      - name: 📊 Generate cleanup report
        run: |
          echo "### 🧹 Deployment Cleanup Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Completed" >> $GITHUB_STEP_SUMMARY
